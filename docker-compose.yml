services:
  ingest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: graphrca-ingest
    working_dir: /app
    command: python ingestion/cli.py load-all --dataset-path data
    environment:
      APP_NAME: GraphRCA API
      APP_ENV: docker
      NEO4J_URI: "${NEO4J_URI:-bolt://host.docker.internal:7687}"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-graphRCApassword}"
      NEO4J_DATABASE: "${NEO4J_DATABASE:-neo4j}"
      LLAMA_BASE_URL: "${LLAMA_BASE_URL:-http://host.docker.internal:8080/v1/chat/completions}"
      LLAMA_TIMEOUT_SECONDS: "${LLAMA_TIMEOUT_SECONDS:-300}"
      RETRIEVAL_DEBUG_ENABLED: "${RETRIEVAL_DEBUG_ENABLED:-false}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"
    volumes:
      - .:/app

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: graphrca-api
    restart: unless-stopped
    depends_on:
      ingest:
        condition: service_completed_successfully
    working_dir: /app
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      APP_NAME: GraphRCA API
      APP_ENV: docker
      NEO4J_URI: "${NEO4J_URI:-bolt://host.docker.internal:7687}"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-graphRCApassword}"
      NEO4J_DATABASE: "${NEO4J_DATABASE:-neo4j}"
      LLAMA_BASE_URL: "${LLAMA_BASE_URL:-http://host.docker.internal:8080/v1/chat/completions}"
      LLAMA_TIMEOUT_SECONDS: "${LLAMA_TIMEOUT_SECONDS:-300}"
      RETRIEVAL_DEBUG_ENABLED: "${RETRIEVAL_DEBUG_ENABLED:-false}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    volumes:
      - .:/app

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: graphrca-ui
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    working_dir: /app
    command: chainlit run ui/app.py --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      UI_BACKEND_BASE_URL: http://api:8000
      UI_INVESTIGATE_ENDPOINT: /investigate
      UI_REQUEST_TIMEOUT_SECONDS: "${UI_REQUEST_TIMEOUT_SECONDS:-300}"
    volumes:
      - .:/app
